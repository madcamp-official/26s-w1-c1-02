server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # Cloudflare 터널(cloudflared)이 오리진으로 127.0.0.1:8000 을 dial 하므로
    # 반드시 8000에서도 수신해야 함. 이게 빠지면 공개 URL이 502(origin refused)가 됨.
    listen 8000;
    listen [::]:8000;
    server_name minigameheaven-v1.madcamp-kaist.org;

    root /var/www/minigameheaven;
    index index.html;

    # 정적 자산 gzip — 배경 픽셀아트가 큰 데이터 URI로 styles.css에 인라인돼 있어
    # 압축 없이는 CSS가 수백 KB로 전송됨. text/css는 nginx 기본 gzip_types에 없으므로 명시.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript text/javascript image/svg+xml application/json;

    # 캐시 버스팅: index.html에 리터럴로 박혀 있는 ?v=__BUILD__ 을 응답 시점에
    # nginx가 배포 빌드 ID(아래 __BUILDID__, deploy.sh가 치환)로 바꿔 내보낸다.
    # 버전 값은 웹 루트 밖(nginx 설정)에만 있으므로, 누가 원본 index.html을
    # (__BUILD__ 그대로) 웹 루트에 덮어써도 항상 최신 버전이 주입된다(self-healing).
    # sub_filter는 text/html 응답에만 적용되어 JS/CSS 캐싱엔 영향 없음.
    sub_filter '?v=__BUILD__' '?v=__BUILDID__';
    sub_filter_once off;

    location / {
        try_files $uri $uri/ =404;
    }

    # HTML은 절대 캐시하지 않아야 매 요청마다 최신 빌드 ID가 주입된다.
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8080/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 소셜 로그인(카카오/구글/네이버) OAuth. 백엔드가 /auth 에 라우터를 마운트하고
    # 각 provider의 redirect_uri(.env)가 https://.../auth/<provider>/callback 이므로
    # 개시 요청과 콜백 모두 여기로 프록시돼야 함. 이 블록이 없으면 /auth/* 가
    # location / 의 try_files로 빠져 404 → 소셜 로그인 전체가 동작하지 않음.
    location /auth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080/health;
    }
}
